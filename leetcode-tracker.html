<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Interview 150 — Tracker</title>
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #16213e;
    --border: #2a2a4a;
    --text: #e0e0f0;
    --text-dim: #8888aa;
    --accent: #4f8cff;
    --accent-dim: #2a5fcf;
    --green: #2ecc71;
    --orange: #f39c12;
    --red: #e74c3c;
    --easy: #2ecc71;
    --medium: #f39c12;
    --hard: #e74c3c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }
  h1 { font-size: 1.8rem; margin-bottom: 4px; }
  .subtitle { color: var(--text-dim); margin-bottom: 24px; font-size: 0.9rem; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    flex: 1;
    min-width: 120px;
    text-align: center;
  }
  .stat-card .num { font-size: 1.6rem; font-weight: 700; }
  .stat-card .label { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }
  .stat-card.easy .num { color: var(--easy); }
  .stat-card.medium .num { color: var(--medium); }
  .stat-card.hard .num { color: var(--hard); }
  .stat-card.done .num { color: var(--accent); }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .controls input, .controls select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.85rem;
  }
  .controls input::placeholder { color: var(--text-dim); }
  .controls input { flex: 1; min-width: 160px; }
  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: opacity .2s;
    white-space: nowrap;
  }
  .btn:hover { opacity: .85; }
  .btn-danger { background: var(--red); }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { background: var(--surface); }

  /* Category sections */
  .category { margin-bottom: 8px; }
  .category-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background .2s;
    user-select: none;
  }
  .category-header:hover { background: var(--surface2); }
  .category-header .name { font-weight: 600; font-size: 0.95rem; }
  .category-header .meta { font-size: 0.8rem; color: var(--text-dim); }
  .category-header .arrow { transition: transform .2s; font-size: 0.8rem; }
  .category.open .category-header .arrow { transform: rotate(90deg); }

  .category-body {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }
  .category.open .category-body { display: block; }

  /* Problem row */
  .problem {
    display: grid;
    grid-template-columns: 32px 1fr 80px 90px 70px 1fr 40px;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    transition: background .15s;
  }
  .problem:last-child { border-bottom: none; }
  .problem:hover { background: var(--surface2); }
  .problem.done-row { opacity: 0.75; }
  .problem.done-row .prob-name { text-decoration: line-through; }

  .prob-checkbox {
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .prob-name { 
    color: var(--text);
    text-decoration: none;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .prob-name:hover { color: var(--accent); }
  .prob-diff {
    font-size: 0.75rem;
    font-weight: 600;
    text-align: center;
  }
  .diff-Easy { color: var(--easy); }
  .diff-Medium { color: var(--medium); }
  .diff-Hard { color: var(--hard); }

  .prob-lang select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 6px;
    border-radius: 4px;
    font-size: 0.8rem;
    width: 100%;
  }
  .prob-time input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 6px;
    border-radius: 4px;
    font-size: 0.8rem;
    width: 100%;
    text-align: center;
  }
  .prob-comment input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 6px;
    border-radius: 4px;
    font-size: 0.8rem;
    width: 100%;
  }
  .prob-actions {
    text-align: center;
  }
  .prob-actions .del-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background .2s;
  }
  .prob-actions .del-btn:hover { background: rgba(231,76,60,.2); color: var(--red); }

  @media (max-width: 700px) {
    .problem {
      grid-template-columns: 28px 1fr 65px;
      grid-template-rows: auto auto auto;
      gap: 4px 8px;
      padding: 10px 12px;
    }
    .prob-checkbox { grid-row: 1; grid-column: 1; }
    .prob-name { grid-row: 1; grid-column: 2 / span 2; }
    .prob-diff { grid-row: 2; grid-column: 1; }
    .prob-lang { grid-row: 2; grid-column: 2; }
    .prob-time { grid-row: 2; grid-column: 3; }
    .prob-comment { grid-row: 3; grid-column: 1 / span 3; }
    .prob-actions { display: none; }
  }

  .footer {
    text-align: center;
    margin-top: 32px;
    padding: 16px;
    color: var(--text-dim);
    font-size: 0.8rem;
  }
  .footer a { color: var(--accent); text-decoration: none; }
</style>

  <div class="stat-card done"><div class="num" id="doneCount">0</div><div class="label">✅ Done</div></div>
  <div class="stat-card"><div class="num" id="donePct">0%</div><div class="label">Progress</div></div>
</div>

<div class="controls">
  <input type="text" id="searchInput" placeholder="🔍 Search problems..." oninput="renderProblems()">

    <option value="all">All</option>
    <option value="undone">Not done</option>

  <button class="btn btn-outline" onclick="collapseAll()">Collapse all</button>
  <button class="btn btn-danger" onclick="confirmReset()">Reset all</button>
</div>

<div id="container"></div>

<div class="footer">
  Data stored in <code>localStorage</code> — your browser only. 
  <a href="https://leetcode.com/studyplan/top-interview-150/" target="_blank">Official study plan →</a>
</div>

// ─── State ──────────────────────────────────────────────────────────
const LANGUAGES = ["Python","Java","C++","JavaScript","TypeScript","Go","Rust","Kotlin","Swift","C#","Ruby","Scala","Other"];

function loadState() {
  try { return JSON.parse(localStorage.getItem('lc150tracker')) || {}; }
  catch { return {}; }
}
function saveState(s) {
  localStorage.setItem('lc150tracker', JSON.stringify(s));
}

// ─── Render ─────────────────────────────────────────────────────────
function renderProblems() {
  const state = loadState();
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filter = document.getElementById('filterDone').value;
  const container = document.getElementById('container');
  container.innerHTML = '';

  let total = 0, easy=0, med=0, hard=0, done=0;

  DATA.forEach((section, si) => {
    // Filter problems
    const filtered = section.problems.filter(p => {
      const s = state[p.id] || {};
      const matches = !search || p.name.toLowerCase().includes(search) || p.diff.toLowerCase().includes(search);
      if (filter === 'done') return matches && s.done;
      if (filter === 'undone') return matches && !s.done;
      return matches;
    });
    if (filtered.length === 0) return;

    // Count stats (from full unfiltered data for accurate stats)
    section.problems.forEach(p => {
      total++;
      if (p.diff === 'Easy') easy++;
      else if (p.diff === 'Medium') med++;
      else hard++;
      if (state[p.id]?.done) done++;
    });

    // Category header
    const catDiv = document.createElement('div');
    catDiv.className = 'category' + (si === 0 ? ' open' : '');
    
    const catHeader = document.createElement('div');
    catHeader.className = 'category-header';
    catHeader.innerHTML = `
      <span class="name">${section.cat}</span>
      <span class="meta">${filtered.length} problems</span>
      <span class="arrow">▶</span>
    `;
    catHeader.onclick = () => catDiv.classList.toggle('open');
    catDiv.appendChild(catHeader);

    const body = document.createElement('div');
    body.className = 'category-body';

    filtered.forEach(p => {
      const s = state[p.id] || {};
      const row = document.createElement('div');
      row.className = 'problem' + (s.done ? ' done-row' : '');

      row.innerHTML = `
        <input type="checkbox" class="prob-checkbox" ${s.done?'checked':''} data-id="${p.id}">
        <a class="prob-name" href="${p.url}" target="_blank">${p.name}</a>
        <span class="prob-diff diff-${p.diff}">${p.diff}</span>
        <span class="prob-lang">
          <select data-id="${p.id}" data-field="lang">
            <option value="">—</option>
            ${LANGUAGES.map(l => `<option value="${l}" ${s.lang===l?'selected':''}>${l}</option>`).join('')}
          </select>
        </span>
        <span class="prob-time">
          <input type="number" min="0" step="1" placeholder="min" value="${s.time||''}" data-id="${p.id}" data-field="time">
        </span>
        <span class="prob-comment">
          <input type="text" placeholder="Notes..." value="${s.comment||''}" data-id="${p.id}" data-field="comment">
        </span>
        <span class="prob-actions">
          <button class="del-btn" data-id="${p.id}" title="Clear this entry">✕</button>
        </span>
      `;
      body.appendChild(row);
    });

    catDiv.appendChild(body);
    container.appendChild(catDiv);
  });

  // Update stats (recalculate from full data)
  updateStats();

  // ── Event listeners ──
  // Checkboxes
  document.querySelectorAll('.prob-checkbox').forEach(cb => {
    cb.addEventListener('change', function() {
      const state = loadState();
      if (!state[this.dataset.id]) state[this.dataset.id] = {};
      state[this.dataset.id].done = this.checked;
      if (!this.checked) {
        // Also clear language/time/comment when unchecking
        delete state[this.dataset.id].lang;
        delete state[this.dataset.id].time;
        delete state[this.dataset.id].comment;
      }
      saveState(state);
      renderProblems();
    });
  });

  // Inputs (lang, time, comment)
  document.querySelectorAll('[data-field]').forEach(el => {
    const handler = function() {
      const state = loadState();
      if (!state[this.dataset.id]) state[this.dataset.id] = {};
      const val = this.value.trim();
      if (val) state[this.dataset.id][this.dataset.field] = val;
      else delete state[this.dataset.id][this.dataset.field];
      // Keep done = false if being cleared, or preserve
      saveState(state);
    };
    el.addEventListener('change', handler);
    el.addEventListener('blur', handler);
  });

  // Delete buttons
  document.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const state = loadState();
      delete state[this.dataset.id];
      saveState(state);
      renderProblems();
    });
  });
}

function updateStats() {
  const state = loadState();
  let total=0, easy=0, med=0, hard=0, done=0;
  DATA.forEach(s => s.problems.forEach(p => {
    total++;
    if (p.diff === 'Easy') easy++;
    else if (p.diff === 'Medium') med++;
    else hard++;
    if (state[p.id]?.done) done++;
  }));
  document.getElementById('totalCount').textContent = total;
  document.getElementById('easyCount').textContent = easy;
  document.getElementById('mediumCount').textContent = med;
  document.getElementById('hardCount').textContent = hard;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('donePct').textContent = total ? Math.round(done/total*100) + '%' : '0%';
}

function expandAll() {
  document.querySelectorAll('.category').forEach(c => c.classList.add('open'));
}
function collapseAll() {
  document.querySelectorAll('.category').forEach(c => c.classList.remove('open'));
}
function confirmReset() {
  if (confirm('Clear ALL progress data? This cannot be undone.')) {
    localStorage.removeItem('lc150tracker');
    renderProblems();
  }
}

// ─── Init ────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', renderProblems);
</script>
